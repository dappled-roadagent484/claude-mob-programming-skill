name: pair-review-mode
description: 测试 Pair 审查模式是否正确识别和启动

test_cases:
  - id: pair-review-trigger-1
    description: "代码审查关键词应触发 Pair 审查模式"
    input:
      user_message: "需要代码审查，帮我看看这段代码"
    expected_behavior:
      - action: ask_mode_selection
      - action: if_user_selects_review
        team_configuration:
          mode: "pair-review"
          members:
            - name: "Jobs"
              role: "Navigator/架构师"
            - name: "Thompson"
              role: "Driver/实现专家"
        workflow:
          - "Jobs: 分析代码 → 制定方案"
          - "Thompson: 编写代码"
          - "Jobs: SOLID审查 → 提出改进"
          - "Thompson: 修改代码"

  - id: pair-review-trigger-2
    description: "重构关键词应触发 Pair 审查模式"
    input:
      user_message: "帮我重构这个支付模块，确保符合SOLID"
    expected_behavior:
      - action: ask_mode_selection
      - action: if_user_selects_review
        team_configuration:
          mode: "pair-review"
          members: ["Jobs", "Thompson"]
        focus:
          - "单一职责检查"
          - "开闭原则检查"
          - "接口隔离检查"
          - "依赖倒置检查"

  - id: pair-review-trigger-3
    description: "review 关键词应触发 Pair 审查模式"
    input:
      user_message: "review 一下这个函数的实现"
    expected_behavior:
      - action: ask_mode_selection
      - action: if_user_selects_review
        team_configuration:
          mode: "pair-review"
          members: ["Jobs", "Thompson"]

checklist:
  - item: "是否正确询问用户选择模式"
    required: true
  - item: "是否启动 Jobs + Thompson 两人团队"
    required: true
  - item: "Jobs 是否只做审查不写代码"
    required: true
  - item: "Thompson 是否只负责实现"
    required: true
  - item: "是否执行 SOLID 检查清单"
    required: true
  - item: "审查意见是否具体明确"
    required: true
